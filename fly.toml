# fly.toml — FES ETHIOPIA AI Bot
# Change "fes-ethiopia-ai" to your chosen app name

app = "fes-ethiopia-ai"
primary_region = "jnb"   # Johannesburg — closest to Ethiopia

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
